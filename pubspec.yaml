name: zuno
description: Zuno – AI-powered relationship companion app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Fonts
  google_fonts: ^6.2.1

  # OTP input
  pinput: ^5.0.0

  # Country code picker
  country_code_picker: ^3.0.0

  # URL launcher for WhatsApp
  url_launcher: ^6.3.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
