name: zuno
description: Zuno – AI-powered relationship companion app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0

  # State management
  flutter_riverpod: ^2.6.1

  # Notifications
  flutter_local_notifications: ^21.0.0
  firebase_messaging: ^16.1.3

  # Navigation
  go_router: ^17.1.0

  # Fonts
  google_fonts: ^8.0.2

  # URL launcher for WhatsApp
  url_launcher: ^6.3.0

  # QR code display & scan
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Icons
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.2
  flutter_dotenv: ^6.0.0
  encrypt: ^5.0.3
  google_sign_in: ^6.2.1
  table_calendar: ^3.2.0
  share_plus: ^12.0.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_zuno.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
